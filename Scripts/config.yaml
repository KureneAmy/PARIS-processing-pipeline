# PARIS Pipeline Configuration
# Updated: 2026-03-30
# Mode: structure or interaction
# 

mode: "interaction"   # structure / interaction

# Sample names
samples:
  - SRR2814763_test

# Raw input files - FASTQ format
# Pre-processed data should have barcode split already
# Format: sample_name: "absolute_path_to_fastq.gz"
raw_files:
  SRR2814763_test: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/data/SRR2814763_test.fastq.gz"

# Singularity container
container: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/run/paris.sif"

# Absolute paths for all resources
paths:
  # Work directory
  work_dir: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/output"

  # Adapter sequences
  adapters_3p: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/data/P6SolexaRC35.fa"

  # STAR indices
  star_genome_index: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/ref/reference_data/star_genome_index/"
  star_smallrna_index: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/ref/reference_data/star_genome_index/"

  # Reference files（For structure mode, set genome files; for interaction mode, set smallrna files）
  genome_fa: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/ref/reference_data/GRCh38.primary_assembly.genome.fa"
  genome_gtf: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/ref/reference_data/annotation.gtf"
  chrom_sizes: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/ref/reference_data/GRCh38.chrom.sizes"

  # Scripts and tools
  read_collapse: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/scripts/icSHAPE-master/bin/readCollapse"
  samPairingCalling: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/scripts/paris-master/samPairingCalling.edited.pl"
  PARIS_module: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/scripts/paris-master/module"
  PARIS_bin: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/scripts/paris-master/bin"
  sam2ngmin: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/scripts/duplex-master/sam2ngmin.py"
  dg2bed: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/scripts/duplex-master/dg2bed.py"
  alternative_structure: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/scripts/duplex-master/alternativestructure.py"
  generate_rna_config: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/scripts/generate_rna_config.py"
  intrxn_specificity: "/mnt1/4.NAS2025/zhangam/easyomics_test/PARIS/scripts/duplex-master/intrxn_specificity_edited.py"


# Parameters
params:
  # Thread settings
  threads: 16
  star_threads: 8

  # Trimming
  minlen3: 28   # minimum length after 3' trimming
  minlen5: 20   # minimum length after 5' trimming
  # HEADCROP value is fixed at 17 (hardcoded in PARIS.smk)

  # STAR alignment settings
  outFilterMultimapNmax_structure: 100  # structure mode: allow multimapping
  outFilterMultimapNmax_interaction: 1  # interaction mode: unique mapping only

  # Chimeric junction detection
  chimSegmentMin: 15          # minimum chimeric segment length
  chimJunctionOverhangMin: 15 # minimum junction overhang

  # Duplex group assembly
  dg_minlen: 15   # minimum duplex arm length
  dg_minpair: 2   # minimum number of supporting read pairs

  # Output format
  dg2bed_option: "bed12"  # bed / bed12 / bed12fixed
  
  
# RNA Interaction Visualization Configuration (interaction mode)
# Define RNA pairs to be visualized
# Each pair contains:
#   - rna1: Identifier for the first RNA (name in the interaction file)
#   - rna2: Identifier for the second RNA
#   - size1: Length of the first RNA
#   - size2: Length of the second RNA
#   - label1: Display label for the first RNA in plots (optional)
#   - label2: Display label for the second RNA in plots (optional)

rna_intrxn_visualization:
  enabled: false
  
  rna_pairs:
    # example 1: 28S rRNA & 45S rRNA
    - rna1: "28S"
      rna2: "45S"
      size1: 5070
      size2: 13357
      label1: "Human 28S rRNA"
      label2: "Human 45S rRNA"


# ============================================================
# Report Configuration
# ============================================================
report:
  # Enable / disable automatic report generation (default: true)
  enable: true

  # Report mode: inherits from top-level "mode" by default.
  # Set explicitly to override (structure / interaction).
  # mode: "interaction"

  # Report metadata
  title: "PARIS Analysis Report"   # Report title shown in the header
  author: ""                        # Author name (optional)
  institution: ""                   # Institution name (optional)
  pi_name: ""                       # PI name (optional)
  project_id: ""                    # Project identifier (optional)

  # Inline images: embed figures as base64 data URIs in the HTML report.
  # When true, the HTML file is fully self-contained and can be opened offline.
  # When false, images are referenced by relative paths (suitable for zipped distributions).
  inline_images: false

  # Output file paths (optional; defaults to <work_dir>/report_<mode>.html/md)
  # output_html: "/path/to/custom_report.html"
  # output_md:   "/path/to/custom_report.md"


# Directory structure created by pipeline:
# output/
# ├── logs/                          # All log files
# │   ├── {sample}_*.log
# │   └── multiqc.log
# ├── temp/                          # Temporary files (auto-cleanup)
# │   └── {sample}/
# │       └── tmp.$$.* (auto-managed)
# ├── qc/                            # QC reports
# │   ├── {sample}/
# │   │   ├── {sample}_fastqc.html
# │   │   └── {sample}_trim5_fastqc.html
# │   └── multiqc_report.html
# ├── {sample}/                      # Per-sample outputs
# │   ├── {sample}_trim3.fastq
# │   ├── {sample}_trim3_nodup.fastq
# │   ├── {sample}_trim5.fastq
# │   ├── {sample}_starGenome_Aligned.sortedByCoord.out.bam   [structure]
# │   ├── {sample}_starGenome_Aligned.sortedByCoord.out.bam.bai [structure]
# │   ├── {sample}_starGenome_Chimeric.out.junction            [structure]
# │   ├── {sample}_DG.geometric                               [structure]
# │   ├── {sample}_DG.geometricsam                            [structure]
# │   ├── {sample}_NGmin.sam                                  [structure]
# │   ├── {sample}_DG.bed                                     [structure]
# │   ├── {sample}.alt                                        [structure]
# │   ├── {sample}_starSmallRNA_Chimeric.out.junction          [interaction]
# │   ├── {sample}_interactions.geometric                     [interaction]
# │   └── {sample}_interactions.filtered                      [interaction]
# ├── report_structure.html          # HTML report (structure mode)
# ├── report_structure.md            # Markdown report (structure mode)
# ├── report_interaction.html        # HTML report (interaction mode)
# └── report_interaction.md          # Markdown report (interaction mode)