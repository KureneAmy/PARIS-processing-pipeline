# PARIS Pipeline Configuration
# Updated: 2026-03-30
# Mode: structure or interaction
# 

mode: "structure"   # structure / interaction

# Sample names
samples:
  - SRR2814763

# Raw input files - FASTQ format
# Pre-processed data should have barcode split already
# Format: sample_name: "absolute_path_to_fastq.gz"
raw_files:
  SRR2814763: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/SRR2814763.fastq.gz"

# Singularity container
container: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/paris.sif"

# Absolute paths for all resources
paths:
  # Work directory
  work_dir: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/output"

  # Adapter sequences
  adapters_3p: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/P6SolexaRC35.fa"

  # STAR indices
  star_genome_index: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/reference_data/star_genome_index/"
  star_smallrna_index: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/reference_data/star_genome_index/"

  # Reference files（For structure mode, set genome files; for interaction mode, set smallrna files）
  genome_fa: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/reference_data/GRCh38.primary_assembly.genome.fa"
  genome_gtf: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/reference_data/annotation.gtf"
  chrom_sizes: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/reference_data/GRCh38.chrom.sizes"

  # Scripts and tools
  read_collapse: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/Scripts/scripts/icSHAPE-master/bin/readCollapse"
  samPairingCalling: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/Scripts/scripts/paris-master/samPairingCalling.edited.pl"
  PARIS_module: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/Scripts/scripts/paris-master/module"
  PARIS_bin: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/Scripts/scripts/paris-master/bin"
  sam2ngmin: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/Scripts/scripts/duplex-master/sam2ngmin.py"
  dg2bed: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/Scripts/scripts/duplex-master/dg2bed.py"
  alternative_structure: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/Scripts/scripts/duplex-master/alternativestructure_edited.py"
  generate_rna_config: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/Scripts/scripts/generate_rna_config.py"
  intrxn_specificity: "/mnt1/4.NAS2025/zhangam/easyomics_test/report/PARIS/Scripts/scripts/duplex-master/intrxn_specificity_edited.py"


# Parameters
params:
  # Thread settings
  threads: 16
  star_threads: 16

  # Trimming
  minlen3: 28   # minimum length after 3' trimming
  minlen5: 20   # minimum length after 5' trimming
  # HEADCROP value is fixed at 17 (hardcoded in PARIS.smk)

  # STAR alignment settings
  outFilterMultimapNmax_structure: 100  # structure mode: allow multimapping
  outFilterMultimapNmax_interaction: 1  # interaction mode: unique mapping only

  # Chimeric junction detection
  chimSegmentMin: 15          # minimum chimeric segment length
  chimJunctionOverhangMin: 15 # minimum junction overhang

  # Duplex group assembly
  dg_minlen: 15   # minimum duplex arm length
  dg_minpair: 2   # minimum number of supporting read pairs

  # Output format
  dg2bed_option: "bed12"  # bed / bed12 / bed12fixed
  

# RNA Alternative Structure Configuration (structure mode)
# This section is for predicting alternative RNA structures based on the identified duplex groups.
# As it takes a long time to run (more than 10 hours per sample), it is disabled by default. To enable, set 'enabled' to true and wait patiently.
alternative_structure:
  enabled: false

# RNA Interaction Visualization Configuration (interaction mode)
# Define RNA pairs to be visualized
# Each pair contains:
#   - rna1: Identifier for the first RNA (name in the interaction file)
#   - rna2: Identifier for the second RNA
#   - size1: Length of the first RNA
#   - size2: Length of the second RNA
#   - label1: Display label for the first RNA in plots (optional)
#   - label2: Display label for the second RNA in plots (optional)

rna_intrxn_visualization:
  enabled: false
  
  rna_pairs:
    # example 1: 28S rRNA & 45S rRNA
    - rna1: "28S"
      rna2: "45S"
      size1: 5070
      size2: 13357
      label1: "Human 28S rRNA"
      label2: "Human 45S rRNA"
      

# Directory structure created by pipeline:
# output/
# ├── logs/                          # All log files
# │   ├── {sample}_*.log
# │   └── multiqc.log
# ├── qc/                            # QC reports
# │   ├── {sample}/
# │   │   ├── {sample}_fastqc.html
# │   │   └── {sample}_trim5_fastqc.html
# │   └── multiqc_report.html
# └── {sample}/                      # Sample outputs
#     ├── {sample}_trim3.fastq
#     ├── {sample}_trim3_nodup.fastq
#     ├── {sample}_trim5.fastq
#     ├── {sample}_starGenome_Aligned.sortedByCoord.out.bam
#     ├── {sample}_starGenome_Aligned.sortedByCoord.out.bam.bai
#     ├── {sample}_starGenome_Chimeric.out.junction
#     ├── {sample}_DG.geometric
#     ├── {sample}_DG.geometricsam
#     ├── {sample}_NGmin.sam
#     ├── {sample}_DG.bed
#     └── {sample}.alt